<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>UK BRAND</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Poppins;
}

body{
background:#fff;
color:#111;
}

/* NAVBAR */

nav{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px 40px;
background:#000;
color:#fff;
}

nav img{
height:45px;
}

nav h2{
font-weight:700;
letter-spacing:2px;
}

.tagline{
font-size:14px;
color:#ccc;
}

/* HERO */

.hero{
height:90vh;
background:url("https://i.ibb.co/VyGCqd0/IMG-20260305-WA0027-1.jpg") center/cover;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
color:#fff;
}

.hero h1{
font-size:55px;
background:rgba(0,0,0,0.6);
padding:20px;
border-radius:10px;
}

.hero button{
margin-top:20px;
padding:15px 35px;
border:none;
background:red;
color:#fff;
font-size:18px;
cursor:pointer;
border-radius:30px;
}

.hero button:hover{
background:#c70000;
}

/* SECTION */

section{
padding:60px 30px;
}

.section-title{
font-size:32px;
font-weight:700;
margin-bottom:25px;
text-align:center;
}

/* PRODUCT CAROUSEL */

.products{
display:flex;
overflow-x:auto;
gap:20px;
scroll-behavior:smooth;
}

.product{
min-width:240px;
border-radius:15px;
background:#fff;
box-shadow:0 4px 20px rgba(0,0,0,0.1);
padding:15px;
transition:0.3s;
}

.product:hover{
transform:translateY(-8px);
}

.product img{
width:100%;
border-radius:10px;
}

.product h4{
margin:10px 0;
}

.price{
color:red;
font-weight:700;
}

.rating{
color:gold;
font-size:14px;
}

.product button{
margin-top:10px;
width:100%;
padding:10px;
border:none;
background:black;
color:#fff;
cursor:pointer;
border-radius:6px;
}

.product button:hover{
background:red;
}

/* CART BUTTON */

.cart-icon{
position:fixed;
top:20px;
right:20px;
background:red;
color:#fff;
padding:12px;
border-radius:50%;
cursor:pointer;
z-index:999;
}

.cart-count{
background:#000;
padding:3px 6px;
border-radius:50%;
font-size:12px;
margin-left:4px;
}

/* CART DRAWER */

.cart{
position:fixed;
right:-400px;
top:0;
width:350px;
height:100%;
background:#fff;
box-shadow:-4px 0 20px rgba(0,0,0,0.2);
padding:20px;
transition:0.4s;
overflow-y:auto;
}

.cart.active{
right:0;
}

.cart h3{
margin-bottom:15px;
}

.cart-item{
border-bottom:1px solid #ddd;
padding:10px 0;
}

input{
width:100%;
padding:10px;
margin-top:10px;
border:1px solid #ddd;
border-radius:6px;
}

.send-btn{
background:red;
color:#fff;
border:none;
padding:12px;
width:100%;
margin-top:15px;
cursor:pointer;
}

/* WHATSAPP */

.whatsapp{
position:fixed;
bottom:20px;
right:20px;
background:#25D366;
color:#fff;
font-size:26px;
padding:12px;
border-radius:50%;
text-decoration:none;
}

/* MOBILE */

@media(max-width:768px){

.hero h1{
font-size:34px;
}

nav{
padding:15px;
}

}

</style>
</head>


<body>

<!-- NAVBAR -->

<nav>
<div>
<img src="https://i.ibb.co/60Rzwpgr/IMG-20260305-WA0000.jpg">
</div>

<div>
<h2>UK BRAND</h2>
<p class="tagline">Fresh finds best prices</p>
</div>
</nav>

<!-- HERO -->

<div class="hero">

<div>

<h1>Premium Sneakers Collection</h1>

<button onclick="document.getElementById('products').scrollIntoView({behavior:'smooth'})">
Shop Now
</button>

</div>

</div>


<!-- PRODUCTS -->

<section id="products">

<h2 class="section-title">Featured Sneakers</h2>

<div class="products" id="productList"></div>

</section>


<!-- CART ICON -->

<div class="cart-icon" onclick="toggleCart()">
🛒 <span class="cart-count" id="cartCount">0</span>
</div>


<!-- CART -->

<div class="cart" id="cart">

<h3>Your Order</h3>

<div id="cartItems"></div>

<h4>Customer Info</h4>

<input id="name" placeholder="Your Name">
<input id="phone" placeholder="Phone Number">
<input id="address" placeholder="House Address">
<input id="city" placeholder="City">

<button class="send-btn" onclick="sendOrder()">Send Order</button>

</div>


<!-- WHATSAPP -->

<a class="whatsapp" href="https://wa.me/923038457357">💬</a>


<!-- EMAILJS -->

<script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>


<script>

emailjs.init("YOUR_PUBLIC_KEY");

let cart=[]

const products=[

{name:"Sneaker 1",price:6499,img:"https://i.ibb.co/VyGCqd0/IMG-20260305-WA0027-1.jpg"},
{name:"Sneaker 2",price:6499,img:"https://i.ibb.co/RGGRbtLy/IMG-20260305-WA0025-1.jpg"},
{name:"Sneaker 3",price:6499,img:"https://i.ibb.co/VpQzkbP6/IMG-20260305-WA0023.jpg"},
{name:"Sneaker 4",price:5999,img:"https://i.ibb.co/RTV7J32V/IMG-20260305-WA0019.jpg"},
{name:"Sneaker 5",price:5999,img:"https://i.ibb.co/dwGSYmK8/IMG-20260305-WA0020.jpg"},
{name:"Sneaker 6",price:6499,img:"https://i.ibb.co/v4pdgyf3/IMG-20260305-WA0016.jpg"},
{name:"Sneaker 7",price:5999,img:"https://i.ibb.co/0yW79qLX/IMG-20260305-WA0024.jpg"},
{name:"Sneaker 8",price:4499,img:"https://i.ibb.co/0V6XcjP2/IMG-20260305-WA0014.jpg"},
{name:"Sneaker 9",price:4499,img:"https://i.ibb.co/SXc8fC47/IMG-20260305-WA0012.jpg"},
{name:"Sneaker 10",price:3499,img:"https://i.ibb.co/8n7WcqnM/IMG-20260305-WA0009.jpg"},
{name:"Sneaker 11",price:6499,img:"https://i.ibb.co/LD0sYDPL/IMG-20260305-WA0008.jpg"},
{name:"Sneaker 12",price:6499,img:"https://i.ibb.co/V8LRncG/IMG-20260305-WA0006.jpg"},
{name:"Sneaker 13",price:3499,img:"https://i.ibb.co/GQ9F2JWD/IMG-20260305-WA0004.jpg"},
{name:"Sneaker 14",price:3499,img:"https://i.ibb.co/Z18Ht5qX/IMG-20260305-WA0002.jpg"}

]

const list=document.getElementById("productList")

products.forEach((p,i)=>{

list.innerHTML+=`
<div class="product">

<img src="${p.img}">

<h4>${p.name}</h4>

<div class="rating">★★★★★</div>

<p class="price">Rs ${p.price}</p>

<button onclick="addToCart(${i})">Add to Cart</button>

</div>
`

})

function addToCart(i){

cart.push(products[i])

document.getElementById("cartCount").innerText=cart.length

renderCart()

}

function renderCart(){

const cartDiv=document.getElementById("cartItems")

cartDiv.innerHTML=""

cart.forEach(p=>{

cartDiv.innerHTML+=`
<div class="cart-item">
${p.name} - Rs ${p.price}
</div>
`

})

}

function toggleCart(){

document.getElementById("cart").classList.toggle("active")

}

function sendOrder(){

let name=document.getElementById("name").value
let phone=document.getElementById("phone").value
let address=document.getElementById("address").value
let city=document.getElementById("city").value

let items=cart.map(p=>p.name+" - Rs "+p.price).join("\n")

emailjs.send("YOUR_SERVICE_ID","YOUR_TEMPLATE_ID",{

name:name,
phone:phone,
address:address,
city:city,
items:items,
email:"bilalkhanakakhail777@gmail.com"

})

alert("Order Sent!")

cart=[]

renderCart()

document.getElementById("cartCount").innerText=0

}

</script>

</body>
</html>
